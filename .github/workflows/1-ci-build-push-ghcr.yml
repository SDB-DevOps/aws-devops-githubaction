# .github/workflows/1-ci-build-push-ghcr.yml
name: 1. CI 构建并推送镜像到GitHub Packages（免费版）

on:
  push:
    branches: [ main ]
    paths: [ 'app/**' ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # 这里不需要任何permissions声明，我们用PAT绕过
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: Trivy 安全扫描
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'app/'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: 登录GitHub Packages（用个人PAT绕过组织限制）
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }} # 用我们自己的PAT，不是GITHUB_TOKEN

      - name: 构建并推送镜像
        env:
          # 强制全小写，GitHub Packages不允许大写
          IMAGE_NAME: ghcr.io/huangleikn/devops-poc-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd app
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest

      - name: 输出镜像地址
        run: |
          echo "✅ 构建成功！"
          echo "✅ 镜像地址：ghcr.io/huangleikn/devops-poc-app:${{ github.sha }}"
          echo "✅ 最新标签：ghcr.io/huangleikn/devops-poc-app:latest"