# .github/workflows/1-ci-build-push-ghcr.yml
name: 1. CI 构建并推送镜像到GitHub Packages（免费版）

on:
  push:
    branches: [ main ]
    paths: [ 'app/**' ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 必须添加这个权限才能推送到GitHub Packages

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: Trivy 安全扫描（和AWS版完全一致）
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'app/'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: 登录GitHub Packages（自动认证，无需额外密钥）
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送镜像
        env:
          IMAGE_NAME: ghcr.io/${{ github.actor }}/devops-poc-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd app
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest

      - name: 输出镜像地址
        run: |
          echo "✅ GitHub Packages镜像地址：ghcr.io/${{ github.actor }}/devops-poc-app:${{ github.sha }}"
          echo "✅ 最新标签镜像地址：ghcr.io/${{ github.actor }}/devops-poc-app:latest"
