# .github/workflows/2-cd-deploy-render.yml
name: 2. CD 一键部署到Render

on:
  # 保留手动触发，支持指定任意镜像标签（方便回滚）
  workflow_dispatch:
    inputs:
      image_tag:
        description: '要部署的镜像标签'
        required: true
        default: 'latest'

  # ✅ 新增：CI 工作流成功完成后自动触发
  workflow_run:
    # 这里必须和 CI 文件里的 name 完全一致（包括标点和空格）
    workflows: ["1. CI 构建并推送镜像到GitHub Packages（免费版）"]
    # 只在 CI 完成时触发（后面会加条件过滤成功状态）
    types: [completed]

jobs:
  deploy-to-render:
    runs-on: ubuntu-latest
    # ✅ 关键保护：只有 CI 构建成功了，才会运行这个部署任务
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: 触发 Render 服务部署
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}
          # 自动触发时用 latest 标签，手动触发时用你输入的标签
          image-url: ghcr.io/huangleikn/devops-poc-app:${{ inputs.image_tag || 'latest' }}

      - name: 部署完成通知
        run: |
          echo "✅ 部署成功！"
          echo "✅ 服务地址：devops-poc-app.onrender.com"