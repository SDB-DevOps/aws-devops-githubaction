# .github/workflows/0-hello-world.yml
name: 0. Hello World 入门流水线

# 触发条件：手动触发
on:
  workflow_dispatch:

jobs:
  say-hello:
    runs-on: ubuntu-latest
    steps:
      - name: 打印Hello World
        run: echo "Hello DevOps! 我的第一个GitHub Actions流水线跑通了！"
      
      - name: 打印系统信息
        run: |
          echo "运行系统：$(uname -a)"
          echo "当前目录：$(pwd)"
          echo "GitHub用户名：${{ github.actor }}"
